# .swiftlint.yml
excluded:
  - .worktrees
  - .claude/worktrees
  - .build
  - .git
  - Vayl/Core/Debug   # dev-only diagnostic tooling, not held to the design-token contract
  - VaylTests         # test code: try!/! are idiomatic (a test SHOULD crash on bad setup)
  - VaylUITests

opt_in_rules:
  - force_unwrapping # Uses the native, bulletproof Swift compiler check

# Rules turned OFF by decision — they misfire on modern Swift/SwiftUI or are
# actively harmful in this codebase. Kept documented so the choice is legible.
disabled_rules:
  - switch_case_alignment                    # fires on one-line switch expressions (Swift 5.9+), which are idiomatic
  - multiple_closures_with_trailing_closure  # noisy on SwiftUI (Toggle/Button with onChange:, etc.)
  - redundant_string_enum_value              # explicit raw values are rename-safety on persisted/Codable enums, not redundancy
  - blanket_disable_command                  # file-level rule disables are intentional in the procedural-art files
  - orphaned_doc_comment                     # fires on `///` used as section headers
  - todo                                     # TODOs are working notes here, tracked out-of-band

# --- Built-in rule tuning ---------------------------------------------------
# This is a design-heavy SwiftUI codebase: procedural-art files, long view
# bodies, and single-character names in geometry/math/closures are idiomatic,
# not defects. Defaults are tuned so lint flags real problems, not house style.

identifier_name:
  # Short names (x, y, p, i, dx…) are legitimate in graphics/math/closure code.
  # Keep the max-length ceiling; drop the min-length floor.
  min_length:
    warning: 0
    error: 0
  # Single-capital geometry shorthand in the procedural-art files (width/height/scale).
  excluded:
    - G
    - H
    - L
    - R
    - S
    - W

type_name:
  max_length:
    warning: 60
    error: 80
  min_length:
    warning: 0
    error: 0
  # Lowercase enums are deliberate design-token namespaces (AppElevation.page,
  # AppGlows.spectrumBorder, …), read as a DSL at the call site — not types to rename.
  excluded:
    - accentFocus
    - card
    - cardBreathe
    - citationPanel
    - compassStarGlow
    - cornerDeck
    - liftCopy
    - modal
    - page
    - safety
    - spectrumBorder
    - tableRimInnerGlow

line_length:
  warning: 250
  error: 500
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 800
  error: 1200

function_body_length:
  warning: 400
  error: 600

file_length:
  warning: 1800
  error: 2500
  ignore_comment_only_lines: true

large_tuple:
  warning: 6
  error: 10

function_parameter_count:
  warning: 12
  error: 16

cyclomatic_complexity:
  warning: 20
  error: 40

nesting:
  type_level:
    warning: 3

# --- Architecture guardrails (the signal worth keeping) ---------------------
# excluded_match_kinds keeps these from firing inside comments / doc comments,
# so mentioning a banned API in a comment (e.g. "never call UIScreen.main")
# is no longer a false-positive error.
custom_rules:
  no_font_system:
    name: "Font.system Banned"
    regex: "Font\\.system"
    message: "Use Font.custom(_:size:relativeTo:) to support Dynamic Type."
    severity: error
    excluded_match_kinds:
      - comment
      - doccomment

  no_uiscreen:
    name: "UIScreen Banned"
    regex: "UIScreen\\.main"
    message: "Use AppLayout.from(geometry) instead."
    severity: error
    excluded_match_kinds:
      - comment
      - doccomment

  no_hardcoded_padding:
    name: "Hardcoded Padding Banned"
    # Only a bare numeric literal is banned: .padding(16) / .padding(.top, 60).
    # Token arithmetic (AppSpacing.xs + 1) and proportional geometry (w * 0.02)
    # are legitimate and must NOT match — hence anchoring the number to a full
    # argument, not "any digit somewhere inside the parens".
    regex: "\\.padding\\(\\s*(\\.[a-zA-Z]+\\s*,\\s*)?-?[0-9]+(\\.[0-9]+)?\\s*\\)"
    message: "Use AppSpacing tokens instead of raw numbers."
    severity: warning   # house-style nudge, not a build blocker
    excluded_match_kinds:
      - comment
      - doccomment

  no_raw_sf_symbols:
    name: "Raw SF Symbol Banned"
    regex: "systemName:\\s*\""
    message: "Use typed AppIcons tokens."
    severity: warning   # house-style nudge, not a build blocker
    excluded_match_kinds:
      - comment
      - doccomment

  no_published:
    name: "@Published Banned"
    regex: "@Published"
    message: "Use the @Observable macro."
    severity: error
    excluded_match_kinds:
      - comment
      - doccomment

  no_dispatch_main:
    name: "DispatchQueue.main Banned"
    regex: "DispatchQueue\\.main"
    message: "Use async/await and MainActor."
    severity: error
    excluded_match_kinds:
      - comment
      - doccomment

  no_anyview:
    name: "AnyView Banned"
    regex: "\\bAnyView\\("
    message: "AnyView destroys SwiftUI performance. Use @ViewBuilder."
    severity: warning   # perf preference with legit uses, not a build blocker
    excluded_match_kinds:
      - comment
      - doccomment
