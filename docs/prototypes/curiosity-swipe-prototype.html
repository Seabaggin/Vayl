<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vayl — Curiosity Pile (feel prototype)</title>
<style>
  :root{
    /* ---- TUNABLE FEEL VALUES (sliders write these) ---- */
    --deal-ms: 480;         /* per-card deal-in flight to the pile */
    --deal-stagger-ms: 60;  /* stagger between each card dealing in */
    --throw-ms: 360;        /* card fly-off after a swipe */
    --round-gap-ms: 1100;   /* beat between round 1 emptied and round 2 deal */
    --swipe-threshold: 95;  /* px past which a release commits the swipe */
    --max-rotate: 14;       /* deg of tilt at full drag */

    --cyan:#42E8E0; --purple:#9B7CFF; --magenta:#FF5FC8;
    --void:#08080d; --ink:#F3F1FA; --muted:#8E8AA6;
    --hairline: rgba(255,255,255,.08);
    --keep: var(--cyan); --pass:#5b5870;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(155,124,255,.12), transparent 55%),
      radial-gradient(90% 70% at 50% 115%, rgba(255,95,200,.10), transparent 55%),
      var(--void);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100dvh; overflow:hidden; user-select:none;
  }
  .phone{ position:relative; width:min(420px,100vw); height:min(900px,100dvh); display:flex; flex-direction:column; padding:28px 22px 26px; }

  .head{ text-align:center; min-height:118px; }
  .round-tag{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
  .round-tag b{ background:linear-gradient(90deg,var(--cyan),var(--purple),var(--magenta)); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:700; }
  .title{ font-size:25px; font-weight:650; line-height:1.18; margin:12px 6px 6px; letter-spacing:-.01em; }
  .sub{ font-size:13.5px; color:var(--muted); }

  .stage{ position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  .card{
    position:absolute; width:290px; height:366px; border-radius:22px;
    background:linear-gradient(180deg,#181826,#111119); border:1px solid var(--hairline);
    box-shadow:0 26px 70px -28px rgba(0,0,0,.92), inset 0 1px 0 rgba(255,255,255,.04);
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:32px; will-change:transform,opacity; cursor:grab; touch-action:none;
  }
  .card::before{ content:""; position:absolute; inset:0 0 auto 0; height:3px; border-radius:22px 22px 0 0; background:linear-gradient(90deg,var(--cyan),var(--purple),var(--magenta)); opacity:.85; }
  .card .label{ font-size:22px; font-weight:600; line-height:1.3; letter-spacing:-.01em; }
  .card .idx{ position:absolute; bottom:15px; left:0; right:0; font-size:10.5px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; }
  .stamp{ position:absolute; top:24px; font-size:14px; font-weight:800; letter-spacing:.22em; padding:6px 13px; border-radius:9px; border:2.5px solid; opacity:0; text-transform:uppercase; }
  .stamp.keep{ left:20px; color:var(--keep); border-color:var(--keep); transform:rotate(-12deg); }
  .stamp.pass{ right:20px; color:var(--pass); border-color:var(--pass); transform:rotate(12deg); }

  .foot{ display:flex; align-items:center; justify-content:center; gap:30px; min-height:96px; transition:opacity .35s; }
  .fbtn{ width:60px; height:60px; border-radius:50%; border:1px solid var(--hairline); background:rgba(255,255,255,.03); color:var(--ink); font-size:23px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s; }
  .fbtn:active{ transform:scale(.9); }
  .fbtn.keep{ color:var(--keep); border-color:rgba(66,232,224,.4); }
  .fbtn.pass{ color:var(--pass); }
  .progress{ position:absolute; bottom:8px; left:0; right:0; text-align:center; font-size:12px; color:var(--muted); }

  .gate{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; opacity:0; pointer-events:none; gap:10px; }
  .gate.show{ opacity:1; transition:opacity .5s; }
  .gate .big{ font-size:27px; font-weight:680; } .gate .small{ font-size:14px; color:var(--muted); }

  .done{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:12px; padding:40px; }
  .done.show{ display:flex; }
  .done .big{ font-size:26px; font-weight:680; } .done .small{ font-size:14px; color:var(--muted); }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
  .chip{ font-size:12.5px; padding:6px 11px; border-radius:999px; border:1px solid rgba(66,232,224,.35); color:var(--cyan); background:rgba(66,232,224,.06); }
  .restart{ margin-top:18px; font-size:13px; color:var(--muted); background:none; border:1px solid var(--hairline); padding:9px 16px; border-radius:10px; cursor:pointer; }

  .tuner{ position:fixed; top:10px; right:10px; width:232px; background:rgba(12,12,20,.92); border:1px solid var(--hairline); border-radius:12px; padding:12px 13px; font-size:11px; color:var(--muted); backdrop-filter:blur(8px); z-index:50; }
  .tuner h4{ margin:0 0 8px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink); }
  .tuner label{ display:flex; justify-content:space-between; margin:9px 0 3px; color:var(--ink); }
  .tuner input[type=range]{ width:100%; accent-color:var(--purple); }
  .tuner .row{ display:flex; gap:8px; margin-top:10px; }
  .tuner button{ flex:1; font-size:11px; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--hairline); border-radius:8px; padding:7px; cursor:pointer; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div class="phone">
    <div class="head">
      <div class="round-tag">Round <b id="rb">1</b> of 2</div>
      <div class="title" id="title">What keeps coming up for you?</div>
      <div class="sub" id="sub">Swipe the pile — right to keep, left to pass.</div>
    </div>
    <div class="stage" id="stage">
      <div class="gate" id="gate"></div>
      <div class="done" id="done"></div>
    </div>
    <div class="foot" id="foot">
      <button class="fbtn pass" id="bpass" title="pass (←)">✕</button>
      <button class="fbtn keep" id="bkeep" title="keep (→)">♥</button>
      <div class="progress" id="prog"></div>
    </div>
  </div>

  <div class="tuner" id="tuner">
    <h4>Feel tuning</h4>
    <label>Deal flight <span id="vdeal"></span></label><input type="range" id="sdeal" min="200" max="900" step="10">
    <label>Deal stagger <span id="vstag"></span></label><input type="range" id="sstag" min="0" max="160" step="5">
    <label>Throw <span id="vthrow"></span></label><input type="range" id="sthrow" min="150" max="700" step="10">
    <label>Round gap <span id="vgap"></span></label><input type="range" id="sgap" min="400" max="2200" step="50">
    <label>Threshold <span id="vthr"></span></label><input type="range" id="sthr" min="50" max="180" step="5">
    <div class="row"><button id="bredeal">Re-deal</button></div>
  </div>

<script>
// ---- universal content (assembled from the 7 existing configs, deduped) ----
const ROUNDS=[
  { field:"communicationGoals", title:"What keeps coming up for you?", sub:"Swipe the pile — right to keep, left to pass.",
    gateBig:"Good.", gateSmall:"Now — what pulls your curiosity?",
    options:[
      {id:"desire_unknown",label:"I don’t know what I actually want"},
      {id:"desire_mismatch",label:"We want different things"},
      {id:"initiating",label:"I wouldn’t know how to ask for it"},
      {id:"jealousy_stuck",label:"Jealousy comes up and gets stuck"},
      {id:"reconnection",label:"We’ve lost some of our connection"},
      {id:"pattern_recognition",label:"I keep ending up in the same place"},
      {id:"self_awareness",label:"My reactions in intimacy surprise me"},
    ]},
  { field:"learningGoals", title:"What are you curious about?", sub:"Swipe the pile — right to keep, left to pass.",
    options:[
      {id:"desire_language",label:"What I want — not what I’ve settled for"},
      {id:"attachment",label:"Why I respond to people the way I do"},
      {id:"jealousy_literacy",label:"What jealousy is actually telling me"},
      {id:"cnm_openness",label:"Whether opening up could work for us"},
      {id:"consent_ongoing",label:"What it means to ask for what I want"},
      {id:"desire_map",label:"Mapping what we each want"},
      {id:"compersion",label:"Feeling good about what brings them joy"},
      {id:"agreements",label:"What our agreements should look like"},
    ]},
];

function el(tag,cls,text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!=null)n.textContent=text; return n; }
const root=document.documentElement, cssNum=(n)=>parseFloat(getComputedStyle(root).getPropertyValue(n));
const stage=document.getElementById('stage');
const elTitle=document.getElementById('title'), elSub=document.getElementById('sub'), elRb=document.getElementById('rb'), elProg=document.getElementById('prog');
const gate=document.getElementById('gate'), done=document.getElementById('done'), foot=document.getElementById('foot');

let roundIdx=0, cardIdx=0, cards=[], selections={communicationGoals:[],learningGoals:[]};

// stable per-position pile jitter (so the pile looks physical, not shuffled)
function seeded(i){ const s=Math.sin(i*99.13)*43758.5; const f=s-Math.floor(s);
  return { ox:(f-0.5)*16, oy:(Math.sin(i*12.9)*0.5)*10, rot:(f-0.5)*7 }; }

function pileTransform(i){ // i = depth, 0 = top
  const j=seeded(i); const depth=Math.min(i,9);
  const ty=j.oy + depth*2.4; const sc=Math.max(0.9, 1-depth*0.011);
  return `translate(${j.ox}px, ${ty}px) rotate(${j.rot}deg) scale(${sc})`;
}

function makeCard(opt){
  const c=el('div','card');
  c.appendChild(el('div','stamp keep','Keep'));
  c.appendChild(el('div','stamp pass','Pass'));
  c.appendChild(el('div','label',opt.label));
  c.appendChild(el('div','idx',opt.id));
  c.dataset.id=opt.id; attachDrag(c); return c;
}

function startRound(r){
  roundIdx=r; cardIdx=0;
  const R=ROUNDS[r];
  elTitle.textContent=R.title; elSub.textContent=R.sub; elRb.textContent=(r+1);
  cards.forEach(c=>c.remove()); cards=[];
  R.options.forEach(opt=>{ const c=makeCard(opt); stage.appendChild(c); cards.push(c); });
  dealPile();
}

// Deal ALL cards from the dealer origin (bottom) into one center pile, staggered.
function dealPile(){
  const dealMs=cssNum('--deal-ms'), stagger=cssNum('--deal-stagger-ms'), n=cards.length;
  cards.forEach((c,i)=>{
    c.style.zIndex = 1000 - i;            // i=0 ends up on top
    c.style.transition='none';
    c.style.transform='translate(0px, 380px) rotate(0deg) scale(.62)';
    c.style.opacity='0';
    c.style.pointerEvents='none';
  });
  // deal bottom-of-pile first (last index) so the top card lands last
  cards.forEach((c,i)=>{
    const delay = (n-1-i)*stagger;
    setTimeout(()=>{
      c.style.transition=`transform ${dealMs}ms cubic-bezier(.2,.8,.25,1), opacity ${dealMs*0.5}ms`;
      c.style.transform=pileTransform(i);
      c.style.opacity='1';
    }, delay);
  });
  const settleAt=(n-1)*stagger + dealMs;
  setTimeout(()=>{ if(cards[cardIdx]) cards[cardIdx].style.pointerEvents='auto'; }, settleAt);
  updateProgress();
}

function topCard(){ return cards[cardIdx]; }
function updateProgress(){ const R=ROUNDS[roundIdx]; const left=R.options.length-cardIdx; elProg.textContent=`${left} in pile · ${selections[R.field].length} kept`; }

function attachDrag(card){
  let startX=0,dx=0,dragging=false;
  const keep=card.querySelector('.keep'), pass=card.querySelector('.pass');
  const baseI=()=>cards.indexOf(card)-cardIdx; // depth (0 = top) for return-home
  const down=(e)=>{ if(card!==topCard())return; dragging=true; card.style.transition='none'; card.style.cursor='grabbing'; startX=e.clientX;
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up); };
  const move=(e)=>{ if(!dragging)return; dx=e.clientX-startX;
    const rot=Math.max(-1,Math.min(1,dx/180))*cssNum('--max-rotate');
    card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
    const t=Math.min(Math.abs(dx)/cssNum('--swipe-threshold'),1); keep.style.opacity=dx>0?t:0; pass.style.opacity=dx<0?t:0; };
  const up=()=>{ if(!dragging)return; dragging=false; card.style.cursor='grab';
    window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up);
    if(Math.abs(dx)>cssNum('--swipe-threshold')) commit(card,dx>0);
    else { card.style.transition='transform .26s cubic-bezier(.2,.8,.2,1)'; card.style.transform=pileTransform(0); keep.style.opacity=0; pass.style.opacity=0; }
    dx=0; };
  card.addEventListener('pointerdown',down);
}

function commit(card,kept){
  const throwMs=cssNum('--throw-ms'), dir=kept?1:-1;
  card.style.transition=`transform ${throwMs}ms cubic-bezier(.4,0,.5,1), opacity ${throwMs}ms`;
  card.style.transform=`translate(${dir*640}px,-30px) rotate(${dir*22}deg)`; card.style.opacity=0; card.style.pointerEvents='none';
  if(kept) selections[ROUNDS[roundIdx].field].push(card.dataset.id);
  cardIdx++;
  const next=cards[cardIdx];
  if(next){ next.style.transition='transform .22s cubic-bezier(.2,.8,.2,1)'; next.style.transform=pileTransform(0); next.style.pointerEvents='auto'; }
  updateProgress();
  if(cardIdx>=cards.length) setTimeout(endRound, throwMs*0.6);
}

function fling(kept){ const c=topCard(); if(c && cardIdx<cards.length) commit(c,kept); }
document.getElementById('bkeep').onclick=()=>fling(true);
document.getElementById('bpass').onclick=()=>fling(false);
window.addEventListener('keydown',(e)=>{ if(e.key==='ArrowRight')fling(true); if(e.key==='ArrowLeft')fling(false); });

function showGate(big,small,then){
  while(gate.firstChild) gate.removeChild(gate.firstChild);
  gate.appendChild(el('div','big',big)); gate.appendChild(el('div','small',small)); gate.classList.add('show');
  setTimeout(()=>{ gate.classList.remove('show'); setTimeout(then,450); }, cssNum('--round-gap-ms'));
}
function endRound(){ if(roundIdx===0){ foot.style.opacity='0'; showGate(ROUNDS[0].gateBig,ROUNDS[0].gateSmall,()=>{ foot.style.opacity='1'; startRound(1); }); } else finish(); }

function finish(){
  foot.classList.add('hidden');
  const all=[...selections.communicationGoals,...selections.learningGoals];
  while(done.firstChild) done.removeChild(done.firstChild);
  done.appendChild(el('div','big','That’s your starting signal.'));
  done.appendChild(el('div','small',`${all.length} selections → curiositySelections`));
  const chips=el('div','chips'); all.forEach(id=>chips.appendChild(el('span','chip',id))); done.appendChild(chips);
  const btn=el('button','restart','Run again'); btn.onclick=reset; done.appendChild(btn);
  done.classList.add('show'); elTitle.textContent=''; elSub.textContent=''; elRb.textContent='✓'; elProg.textContent='';
}
function reset(){ selections={communicationGoals:[],learningGoals:[]}; done.classList.remove('show'); foot.classList.remove('hidden'); foot.style.opacity='1'; startRound(0); }
window.reset=reset;

// tuner
[['sdeal','--deal-ms','vdeal','ms'],['sstag','--deal-stagger-ms','vstag','ms'],['sthrow','--throw-ms','vthrow','ms'],['sgap','--round-gap-ms','vgap','ms'],['sthr','--swipe-threshold','vthr','px']]
.forEach(([sid,varName,vid,unit])=>{ const s=document.getElementById(sid),v=document.getElementById(vid);
  s.value=cssNum(varName); v.textContent=s.value+unit;
  s.addEventListener('input',()=>{ root.style.setProperty(varName,s.value); v.textContent=s.value+unit; }); });
document.getElementById('bredeal').onclick=()=>{ if(roundIdx===0 || cardIdx<cards.length) startRound(roundIdx); };

startRound(0);
</script>
</body>
</html>
