<!-- Vayl: bloodied-blade strike, organic spatter (displacement-roughened). Real tokens. -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vayl - blade strike</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=switzer@300,400,500&display=swap" rel="stylesheet" />

<style>
  :root{
    --void:#0a0810;
    --text:#e8e8f0;--text-2:rgba(255,255,255,.65);--text-3:rgba(255,255,255,.4);
    --cyan:#00c2ff;--purple:#6c3ae0;--magenta:#ff006a;
    --spectrum:linear-gradient(115deg,#00c2ff 0%,#6c3ae0 50%,#ff006a 100%);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--void);color:var(--text);font-family:"Switzer",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .spotbg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .spotbg::before{content:"";position:absolute;left:32%;top:34%;width:80vw;max-width:760px;height:520px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(108,58,224,.2),rgba(0,194,255,.07) 44%,transparent 66%);filter:blur(44px)}
  .stage{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:128px 40px}

  h1{position:relative;font-family:"Clash Display";font-weight:600;letter-spacing:-.025em;line-height:1.12;font-size:clamp(38px,5.2vw,68px);max-width:14ch}
  .x{position:relative;display:inline-block;white-space:nowrap;color:rgba(232,232,240,.46)}

  .ov{position:absolute;left:50%;top:56%;width:300px;height:240px;transform:translate(-50%,-50%);overflow:visible;pointer-events:none;z-index:2;
    filter:drop-shadow(0 0 2px rgba(108,58,224,.5))}
  .ov .ink{fill:url(#sg)}
  .blade{fill:url(#sg);transform-box:fill-box;transform-origin:left center;transform:scaleX(0);animation:slash .55s var(--ease) .15s forwards}
  .cast{transform-box:fill-box;opacity:0;transform:translateY(7px);animation:castIn .5s var(--ease) .5s forwards}
  .drips{transform-box:fill-box;opacity:0;transform:translateY(-7px);animation:dripIn .5s var(--ease) .58s forwards}
  .mist{opacity:0;animation:mistIn .6s var(--ease) .66s forwards}

  .sub{position:relative;font-size:clamp(16px,1.35vw,19px);color:var(--text-2);max-width:42ch;margin-top:30px;opacity:0;animation:rise .8s var(--ease) .85s forwards}

  @keyframes slash{to{transform:scaleX(1)}}
  @keyframes castIn{to{opacity:1;transform:translateY(0)}}
  @keyframes dripIn{to{opacity:1;transform:translateY(0)}}
  @keyframes mistIn{to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    .blade{transform:scaleX(1)}.cast,.drips{opacity:1;transform:none}.mist{opacity:1}.sub{opacity:1;transform:none}
  }
</style>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="sg" gradientUnits="userSpaceOnUse" x1="20" y1="0" x2="280" y2="0">
      <stop offset="0" stop-color="#00c2ff"/><stop offset=".5" stop-color="#6c3ae0"/><stop offset="1" stop-color="#ff006a"/>
    </linearGradient>
    <filter id="rough" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="spotbg" aria-hidden="true"></div>

<div class="stage">

    <!-- fine mist (clean, no roughen) -->
    <g class="mist ink">
      <circle cx="116" cy="60" r=".9" opacity=".3"/><circle cx="160" cy="40" r=".7" opacity=".28"/><circle cx="190" cy="58" r=".8" opacity=".28"/><circle cx="98" cy="76" r=".7" opacity=".26"/><circle cx="204" cy="76" r=".7" opacity=".26"/><circle cx="140" cy="34" r=".6" opacity=".24"/><circle cx="176" cy="36" r=".6" opacity=".24"/><circle cx="212" cy="54" r=".6" opacity=".22"/><circle cx="94" cy="58" r=".6" opacity=".22"/><circle cx="150" cy="24" r=".5" opacity=".2"/><circle cx="166" cy="22" r=".5" opacity=".2"/><circle cx="124" cy="44" r=".6" opacity=".24"/><circle cx="198" cy="46" r=".6" opacity=".24"/><circle cx="88" cy="84" r=".6" opacity=".22"/><circle cx="216" cy="84" r=".5" opacity=".2"/><circle cx="132" cy="18" r=".5" opacity=".18"/>
    </g>
  </svg></span>.</h1>

  <p class="sub">It needs tools for the part that is actually hard.</p>
</div>
